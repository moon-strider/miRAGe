[baseline]
name = "naive-rag-qdrant-bge-small-openrouter"

[embedding]
model = "BAAI/bge-small-en-v1.5"
batch_size = 64

[chunking]
tokenizer = "cl100k_base"
chunk_size = 500
chunk_overlap = 50

[retrieval]
top_k = 5
mrr_depth = 10
distance = "cosine"
collection = "naive_rag_baseline"

[generation]
model = "openai/gpt-4o-mini"
temperature = 0.0
max_tokens = 350
insufficient_context_response = "INSUFFICIENT_CONTEXT"
system_prompt = """
You answer only from the provided context.
If the context is insufficient, reply exactly with INSUFFICIENT_CONTEXT.
When you answer from the context, cite the supporting document ids in square brackets, for example [doc-001].
Do not invent citations.
"""
pricing_input_per_1m_tokens_usd = 0.15
pricing_output_per_1m_tokens_usd = 0.6

[evaluation]
runs_dir = "runs"
metrics = [
  "hit_at_5",
  "recall_at_5",
  "mrr_at_10",
  "exact_match",
  "token_f1",
  "citation_hit_rate",
  "latency_p50_ms",
  "latency_p95_ms",
  "estimated_cost_usd",
]
