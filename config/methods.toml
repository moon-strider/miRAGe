[prompt_variants.prompt-grounded-citations-v1]
system_prompt = """
You answer only from the provided context.
If the context is insufficient, reply exactly with {insufficient_context_response}.
When you answer from the context, cite the supporting document ids in square brackets, for example [doc-001].
Do not invent citations.
"""
user_template = """
Answer the question using only the context below.

Question: {question}

Context:
{context}
"""

[prompt_variants.prompt-brief-grounded-v1]
system_prompt = """
You answer only from the provided context.
Keep the answer brief.
If the context is insufficient, reply exactly with {insufficient_context_response}.
Cite supporting document ids in square brackets.
"""
user_template = """
Question: {question}

Context:
{context}
"""

[prompt_variants.prompt-evidence-first-v1]
system_prompt = """
You answer only from the provided context.
First extract the key evidence from the context, then answer.
If the context is insufficient, reply exactly with {insufficient_context_response}.
Every non-empty answer must cite supporting document ids in square brackets.
"""
user_template = """
Question: {question}

Context:
{context}

Return two short sections:
Evidence:
Answer:
"""

[prompt_variants.prompt-strict-abstain-v1]
system_prompt = """
You answer only from the provided context.
If the answer is not directly supported, reply exactly with {insufficient_context_response}.
Do not guess, hedge, or use outside knowledge.
When supported, answer conservatively and cite the supporting document ids in square brackets.
"""
user_template = """
Question: {question}

Context:
{context}
"""

